name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Run Python test suite with coverage
        run: uv run --no-sync pytest --cov=robotframework_aidebug --cov-report=term-missing
      - name: Run benchmark baseline
        run: uv run --no-sync python -m robotframework_aidebug.benchmark
      - name: Run CLI demo smoke test
        run: uv run --no-sync python -m robotframework_aidebug demo

  vscode-extension:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - name: Install backend
        run: |
          uv sync --group dev
          uv pip install .
      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm ci
      - name: Run extension tests
        working-directory: vscode-extension
        run: npm test
      - name: Build VSIX
        working-directory: vscode-extension
        run: npm run package:vsix
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: robotframework-aidebug-vsix
          path: vscode-extension/dist/*.vsix
